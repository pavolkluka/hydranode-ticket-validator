<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo Symbol -->
  <g transform="translate(10, 10)">
    <!-- Hexagon shape representing "node" -->
    <polygon points="20,5 35,12.5 35,27.5 20,35 5,27.5 5,12.5" 
             fill="url(#gradient)" 
             stroke="#1565c0" 
             stroke-width="2"/>
    
    <!-- Inner elements representing connections -->
    <circle cx="20" cy="20" r="3" fill="white"/>
    <line x1="20" y1="10" x2="20" y2="16" stroke="white" stroke-width="2"/>
    <line x1="20" y1="24" x2="20" y2="30" stroke="white" stroke-width="2"/>
    <line x1="12" y1="16" x2="16.5" y2="18" stroke="white" stroke-width="2"/>
    <line x1="23.5" y1="22" x2="28" y2="24" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Logo Text -->
  <text x="50" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1976d2">
    Hydranode
  </text>
  <text x="50" y="42" font-family="Arial, sans-serif" font-size="10" fill="#666">
    Ticket Validator
  </text>
</svg>